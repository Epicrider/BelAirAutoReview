<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BelAir Review</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">BelAir&nbsp;Review</div>
    <div id="target-info" title=""></div>
    <button id="btn-summary" hidden
      title="View the agent's overall summary for this review">Summary</button>
    <button id="btn-publish" hidden
      title="Post your comments to the PR as review comments">Publish to PR</button>
    <button id="btn-wrap" title="Toggle word wrap for code (w)">Wrap</button>
    <div id="diff-layout" class="segmented" role="group" aria-label="Diff layout" hidden>
      <button id="btn-side-by-side" class="seg-btn" data-layout="side-by-side"
        title="Side-by-side diff">Side&#8209;by&#8209;side</button>
      <button id="btn-inline" class="seg-btn" data-layout="inline"
        title="Inline (unified) diff">Inline</button>
    </div>
    <div class="nav">
      <button id="btn-next-unreviewed" title="Jump to next unreviewed step (u)">Next&nbsp;unreviewed</button>
      <button id="btn-prev" title="Previous step (←)">←&nbsp;Prev</button>
      <span id="progress">Loading…</span>
      <button id="btn-next" title="Next step (→)">Next&nbsp;→</button>
    </div>
  </header>
  <div id="progress-bar" title="Review progress"><div id="progress-bar-fill"></div></div>

  <div id="layout">
    <aside id="sidebar" aria-label="All steps">
      <div id="sidebar-toolbar">
        <button id="btn-collapse-all" title="Collapse or expand all file groups">Collapse all</button>
        <button id="btn-toggle-info" hidden
          title="Show or hide every step's order-explanation note">Show all info</button>
      </div>
      <div id="sidebar-list"></div>
    </aside>
    <div id="sidebar-resizer" class="resizer resizer-x" title="Drag to resize"
      role="separator" aria-orientation="vertical"></div>

    <main id="main">
      <div id="step-header">
        <span id="step-file" class="mono"></span>
        <span id="step-lines" class="mono dim"></span>
        <span id="step-kind" class="badge"></span>
        <span id="step-symbol" class="mono dim"></span>
        <span class="step-hint dim">click a line number to comment on that line</span>
        <label id="reviewed-toggle" title="Mark this step reviewed">
          <input type="checkbox" id="reviewed-check" /> Reviewed
        </label>
      </div>

      <div id="context-bar">
        <span class="ctx-label dim">Context:</span>
        <button id="btn-ctx-above" title="Show more lines above">+15 above</button>
        <button id="btn-ctx-below" title="Show more lines below">+15 below</button>
        <button id="btn-ctx-reset" title="Collapse back to the chunk" hidden>Reset</button>
        <span id="ctx-status" class="dim"></span>
      </div>

      <div id="editors">
        <div id="editor-plain" class="editor"></div>
        <div id="editor-diff" class="editor" hidden></div>
      </div>

      <div id="comment-resizer" class="resizer resizer-y" title="Drag to resize"
        role="separator" aria-orientation="horizontal"></div>

      <div id="comment-box">
        <label for="comment">
          Your comment on this step
          <span id="save-state" class="dim"></span>
        </label>
        <textarea id="comment" rows="3"
          placeholder="Type your review comment for this step — saved automatically to comments.json"></textarea>
      </div>
    </main>
  </div>

  <div id="summary-backdrop" hidden>
    <div id="summary-panel" role="dialog" aria-label="Review summary" aria-modal="true">
      <div class="summary-head">
        <span class="summary-title">Review summary</span>
        <span class="dim summary-note">agent-generated · read-only</span>
        <button id="summary-close" title="Close (Esc)">✕</button>
      </div>
      <div id="summary-body"></div>
    </div>
  </div>

  <div id="line-comment-backdrop" hidden>
    <div id="line-comment-panel" role="dialog" aria-label="Line comment" aria-modal="true">
      <div class="lc-modal-head">
        <span id="lc-title" class="summary-title">Comment on line</span>
        <button id="lc-close" title="Close (Esc)">✕</button>
      </div>
      <textarea id="lc-input" placeholder="Comment on this line — saved to line-comments.json"></textarea>
      <div class="lc-modal-actions">
        <button id="lc-delete" hidden class="lc-delete">Delete</button>
        <button id="lc-cancel">Cancel</button>
        <button id="lc-save" class="lc-save">Save</button>
      </div>
    </div>
  </div>

  <div id="error-banner" hidden></div>
  <div id="toast" hidden></div>

  <script src="/vendor/monaco/vs/loader.js"></script>
  <script>
    require.config({ paths: { vs: '/vendor/monaco/vs' } });
    require(['vs/editor/editor.main'], function () {
      window.__monacoReady = true;
      if (window.__startApp) window.__startApp();
    });
  </script>
  <script src="/app.js"></script>
</body>
</html>
